name: Release to PyPI

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version-file: .python-version
          enable-cache: true

      - name: Build package
        run: uv build --no-sources

      - name: Publish to PyPI
        run: uv publish
